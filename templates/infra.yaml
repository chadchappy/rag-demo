{{- $ns := .Values.namespace -}}
---
# etcd for Milvus
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.18
          command: ["etcd", "--advertise-client-urls=http://0.0.0.0:2379", "--listen-client-urls=http://0.0.0.0:2379", "--data-dir=/etcd-data"]
          ports:
            - containerPort: 2379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: {{ $ns }}
spec:
  selector:
    app: etcd
  ports:
    - port: 2379
      targetPort: 2379
---
# Milvus vector DB (CPU mode)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
    spec:
      containers:
        - name: milvus
          image: milvusdb/milvus:v2.4.17
          command: ["milvus", "run", "standalone"]
          env:
            - name: ETCD_ENDPOINTS
              value: "etcd:2379"
            - name: MINIO_ADDRESS
              value: "rag-minio:9000"
            - name: COMMON_STORAGETYPE
              value: "local"
            - name: KNOWHERE_GPU_MEM_POOL_SIZE
              value: "0"
          ports:
            - containerPort: 19530
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: milvus
  namespace: {{ $ns }}
spec:
  selector:
    app: milvus
  ports:
    - port: 19530
      targetPort: 19530
---
# Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-redis-master
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-redis-master
  template:
    metadata:
      labels:
        app: rag-redis-master
    spec:
      containers:
        - name: redis
          image: redis:7.4
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: rag-redis-master
  namespace: {{ $ns }}
spec:
  selector:
    app: rag-redis-master
  ports:
    - port: 6379
      targetPort: 6379
---
# MinIO
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-minio
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-minio
  template:
    metadata:
      labels:
        app: rag-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-11-07T00-52-20Z
          command: ["minio", "server", "/data"]
          env:
            - name: MINIO_ROOT_USER
              value: "minioadmin"
            - name: MINIO_ROOT_PASSWORD
              value: "minioadmin"
          ports:
            - containerPort: 9000
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

