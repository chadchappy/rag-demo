apiVersion: v1
kind: ConfigMap
metadata:
  name: chatbot-ui
  namespace: {{ .Values.namespace }}
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>RAG Chatbot — RunAI Demo</title>
    <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0f1117;--surface:#1a1d27;--border:#2d313d;--primary:#76b900;--primary-hover:#8dd100;--text:#e4e4e7;--text-dim:#9ca3af;--user-bg:#1e3a5f;--bot-bg:#1f2937;--input-bg:#252830}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:12px}
    header .logo{width:32px;height:32px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#000}
    header h1{font-size:18px;font-weight:600}
    header .badge{font-size:11px;background:var(--primary);color:#000;padding:2px 8px;border-radius:10px;font-weight:600;margin-left:8px}
    .chat-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
    .msg{max-width:75%;padding:12px 16px;border-radius:12px;line-height:1.6;font-size:14px;white-space:pre-wrap;word-wrap:break-word;animation:fadeIn .2s}
    .msg.user{align-self:flex-end;background:var(--user-bg);border-bottom-right-radius:4px}
    .msg.bot{align-self:flex-start;background:var(--bot-bg);border:1px solid var(--border);border-bottom-left-radius:4px}
    .msg.bot .label{font-size:11px;color:var(--primary);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
    .msg.typing::after{content:'▋';animation:blink 1s infinite}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    @keyframes blink{50%{opacity:0}}
    .input-area{background:var(--surface);border-top:1px solid var(--border);padding:16px 24px}
    .input-wrap{display:flex;gap:10px;max-width:900px;margin:0 auto}
    .input-wrap textarea{flex:1;background:var(--input-bg);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px 16px;font-size:14px;font-family:inherit;resize:none;height:48px;max-height:120px;outline:none;transition:border-color .2s}
    .input-wrap textarea:focus{border-color:var(--primary)}
    .input-wrap button{background:var(--primary);color:#000;border:none;border-radius:10px;padding:0 20px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;white-space:nowrap}
    .input-wrap button:hover{background:var(--primary-hover)}
    .input-wrap button:disabled{opacity:.4;cursor:not-allowed}
    .status{text-align:center;padding:8px;font-size:12px;color:var(--text-dim)}
    </style>
    </head>
    <body>
    <header>
      <div class="logo">R</div>
      <h1>RAG Chatbot</h1>
      <span class="badge">RunAI Demo</span>
    </header>
    <div class="chat-area" id="chat">
      <div class="msg bot"><div class="label">Assistant</div>Hello! I'm the RAG demo assistant running on RunAI. Ask me anything.</div>
    </div>
    <div class="status" id="status">Connected to RAG server</div>
    <div class="input-area">
      <div class="input-wrap">
        <textarea id="input" placeholder="Type your message..." rows="1"></textarea>
        <button id="send" onclick="sendMsg()">Send</button>
      </div>
    </div>
    <script>
    const API = '/api/v1/chat/completions';
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const status = document.getElementById('status');
    let history = [];
    input.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()} });
    input.addEventListener('input', ()=>{input.style.height='48px';input.style.height=Math.min(input.scrollHeight,120)+'px'});

    async function sendMsg(){
      const text=input.value.trim(); if(!text)return;
      input.value='';input.style.height='48px';sendBtn.disabled=true;
      appendMsg('user',text);
      history.push({role:'user',content:text});
      const botEl=appendMsg('bot','','typing');
      status.textContent='Generating...';
      try{
        const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({messages:history.slice(-10),model:'meta/llama-3.3-nemotron-super-49b-v1.5',
            stream:true,temperature:0.7,max_tokens:1024,use_knowledge_base:true})});
        if(!res.ok)throw new Error('Server returned '+res.status);
        const reader=res.body.getReader();const dec=new TextDecoder();let full='';let buf='';
        while(true){
          const{done,value}=await reader.read();if(done)break;
          buf+=dec.decode(value,{stream:true});
          const lines=buf.split('\n');buf=lines.pop();
          for(const line of lines){
            if(!line.startsWith('data: ')||line==='data: [DONE]')continue;
            try{const j=JSON.parse(line.slice(6));const c=j.choices?.[0]?.delta?.content;
              if(c){full+=c;botEl.innerHTML='<div class="label">Assistant</div>'+escHtml(full)+'▋'}
            }catch(e){}
          }
        }
        botEl.innerHTML='<div class="label">Assistant</div>'+escHtml(full||'No response received.');
        botEl.classList.remove('typing');
        history.push({role:'assistant',content:full});
        status.textContent='Connected to RAG server';
      }catch(e){
        botEl.innerHTML='<div class="label">Assistant</div>⚠️ '+escHtml(e.message);
        botEl.classList.remove('typing');status.textContent='Error — check server';
      }
      sendBtn.disabled=false;input.focus();
    }
    function appendMsg(role,text,cls=''){
      const d=document.createElement('div');d.className='msg '+role+(cls?' '+cls:'');
      if(role==='bot')d.innerHTML='<div class="label">Assistant</div>'+escHtml(text);
      else d.textContent=text;
      chat.appendChild(d);chat.scrollTop=chat.scrollHeight;return d;
    }
    function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
    </script>
    </body>
    </html>
  nginx.conf: |
    server {
        listen 8080;
        root /usr/share/nginx/html;
        index index.html;
        location / {
            try_files $uri $uri/ /index.html;
        }
        location /api/ {
            proxy_pass http://rag-server:8081/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 300s;
        }
    }

