apiVersion: v1
kind: ConfigMap
metadata:
  name: nim-service-scripts
  namespace: {{ .Values.namespace }}
data:
  server.py: |
    #!/usr/bin/env python3
    """NIM-compatible service for llm/embedding/reranking modes."""
    import json,os,time,random,uuid
    from http.server import HTTPServer,BaseHTTPRequestHandler
    MODE=os.environ.get("NIM_MODE","llm")
    MODEL=os.environ.get("NIM_MODEL_NAME","default-model")
    PORT=int(os.environ.get("NIM_PORT","8000"))
    class H(BaseHTTPRequestHandler):
        def _j(self,code,d):
            b=json.dumps(d).encode()
            self.send_response(code);self.send_header("Content-Type","application/json")
            self.send_header("Content-Length",str(len(b)));self.end_headers();self.wfile.write(b)
        def do_GET(self):
            if self.path in("/v1/health/ready","/health","/health/ready","/v1/health/live"):
                self._j(200,{"status":"ready"})
            elif self.path=="/v1/models":
                self._j(200,{"object":"list","data":[{"id":MODEL,"object":"model","owned_by":"nvidia"}]})
            else:self._j(404,{"error":"not found"})
        def do_POST(self):
            n=int(self.headers.get("Content-Length",0))
            body=json.loads(self.rfile.read(n)) if n else {}
            if MODE=="llm" and "/chat/completions" in self.path:
                msg="This is a demo LLM response. The RAG pipeline is working correctly."
                stream=body.get("stream",False)
                if stream:
                    self.send_response(200);self.send_header("Content-Type","text/event-stream")
                    self.send_header("Transfer-Encoding","chunked");self.end_headers()
                    for w in msg.split():
                        chunk={"id":"chatcmpl-"+uuid.uuid4().hex[:8],"object":"chat.completion.chunk","created":int(time.time()),"model":MODEL,"choices":[{"index":0,"delta":{"content":w+" "},"finish_reason":None}]}
                        self.wfile.write(f"data: {json.dumps(chunk)}\n\n".encode());self.wfile.flush()
                    final={"id":"chatcmpl-done","object":"chat.completion.chunk","created":int(time.time()),"model":MODEL,"choices":[{"index":0,"delta":{},"finish_reason":"stop"}]}
                    self.wfile.write(f"data: {json.dumps(final)}\n\ndata: [DONE]\n\n".encode());self.wfile.flush()
                else:
                    self._j(200,{"id":"chatcmpl-"+uuid.uuid4().hex[:8],"object":"chat.completion","created":int(time.time()),"model":MODEL,"choices":[{"index":0,"message":{"role":"assistant","content":msg},"finish_reason":"stop"}],"usage":{"prompt_tokens":10,"completion_tokens":20,"total_tokens":30}})
            elif MODE=="embedding" and "/embeddings" in self.path:
                inp=body.get("input",[]);inp=[inp] if isinstance(inp,str) else inp
                self._j(200,{"object":"list","model":MODEL,"data":[{"object":"embedding","index":i,"embedding":[round(random.gauss(0,0.1),6) for _ in range(1024)]} for i in range(len(inp))],"usage":{"prompt_tokens":len(inp)*5,"total_tokens":len(inp)*5}})
            elif MODE=="reranking" and "/ranking" in self.path:
                passages=body.get("passages",[])
                rankings=sorted([{"index":i,"logit":round(random.uniform(0.1,0.95),4)} for i in range(len(passages))],key=lambda x:x["logit"],reverse=True)
                self._j(200,{"rankings":rankings,"model":MODEL})
            else:self._j(404,{"error":"unknown endpoint"})
    if __name__=="__main__":
        print(f"NIM service [{MODE}] model={MODEL} port={PORT}");HTTPServer(("0.0.0.0",PORT),H).serve_forever()