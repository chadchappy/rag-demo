{{- $ns := .Values.namespace -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestor-server
  namespace: {{ $ns }}
  labels:
    app: ingestor-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestor-server
  template:
    metadata:
      labels:
        app: ingestor-server
    spec:
      containers:
        - name: ingestor
          image: python:3.11-slim
          command: ["/bin/sh", "-c", "pip install --quiet pypdf && python3 /scripts/ingestor.py"]
          env:
            - name: INGESTOR_PORT
              value: "8082"
            - name: APP_VECTORSTORE_URL
              value: "http://milvus:19530"
            - name: APP_EMBEDDINGS_SERVERURL
              value: "http://nemoretriever-embedding-ms:8000/v1"
            - name: APP_EMBEDDINGS_MODELNAME
              value: "nvidia/llama-3.2-nv-embedqa-1b-v2"
            - name: APP_EMBEDDINGS_DIMENSIONS
              value: "1024"
            - name: COLLECTION_NAME
              value: "rag_demo"
            - name: LOGLEVEL
              value: "INFO"
          ports:
            - containerPort: 8082
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: ingestor-script
              mountPath: /scripts
      volumes:
        - name: ingestor-script
          configMap:
            name: ingestor-service-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: ingestor-server
  namespace: {{ $ns }}
spec:
  selector:
    app: ingestor-server
  ports:
    - port: 8082
      targetPort: 8082
